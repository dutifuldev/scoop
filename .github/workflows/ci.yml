name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: news
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: news_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U news"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Format check
        working-directory: backend
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::Go files are not formatted. Run 'gofmt -w .'"
            gofmt -l .
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.0
          working-directory: backend

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Build
        working-directory: backend
        run: go build ./cmd/scoop

      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgres://news:testpass@localhost:5432/news_pipeline?sslmode=disable
        run: go test ./... -count=1 -timeout 5m

      - name: Coverage gate
        working-directory: backend
        env:
          DATABASE_URL: postgres://news:testpass@localhost:5432/news_pipeline?sslmode=disable
        run: ./scripts/check-go-coverage.sh

      - name: Slophammer static check
        run: go run github.com/dutifuldev/slophammer/go/cmd/slophammer@latest check .

      - name: Slophammer DRY gate
        run: go run github.com/dutifuldev/slophammer/go/cmd/slophammer@latest go dry .

      - name: Slophammer CRAP gate
        env:
          DATABASE_URL: postgres://news:testpass@localhost:5432/news_pipeline?sslmode=disable
        run: go run github.com/dutifuldev/slophammer/go/cmd/slophammer@latest go crap .

      - name: Slophammer mutate4go mutation gate
        run: go run github.com/dutifuldev/slophammer/go/cmd/slophammer@latest go mutate . --scan

      - name: Slophammer executable check
        env:
          DATABASE_URL: postgres://news:testpass@localhost:5432/news_pipeline?sslmode=disable
        run: go run github.com/dutifuldev/slophammer/go/cmd/slophammer@latest check . --execute

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          check-latest: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Test
        working-directory: frontend
        run: pnpm run test

      - name: Build
        working-directory: frontend
        run: pnpm run build

  embedding-service:
    name: Embedding Service (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: embedding-service/.python-version

      - name: Lint
        working-directory: embedding-service
        run: uv run --no-project --with ruff ruff check .

      - name: Typecheck
        working-directory: embedding-service
        run: uv run --no-project --with mypy mypy main.py

      - name: Test
        working-directory: embedding-service
        run: uv run --no-project --with pytest pytest
